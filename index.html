<!DOCTYPE html>
<html lang="en">
<head>
    <title>RA Biblioteca</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
<a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" raycaster="objects: .clickable">

    <a-assets>
        <a-asset-item id="model" src="./library.glb"></a-asset-item>
        <img id="img1" src="./mapaempatia.png">
        <img id="img2" src="./ciclodevida.png">
        <img id="img3" src="./funciones.png">
        <img id="img4" src="./pilaresderestriccion.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false">
        <a-cursor fuse="true" fuse-timeout="1200" color="yellow"></a-cursor>
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#model" position="0 -0.4 -0.5" scale="0.01 0.01 0.01"></a-gltf-model>

        <a-sphere id="hp1" position="-0.4 0.2 -0.2" radius="0.05" color="yellow" class="clickable"></a-sphere>
        <a-sphere id="hp2" position="-0.1 0.4 -0.2" radius="0.05" color="yellow" class="clickable"></a-sphere>
        <a-sphere id="hp3" position="0.2 0.3 -0.2" radius="0.05" color="yellow" class="clickable"></a-sphere>
        <a-sphere id="hp4" position="0.4 0.1 -0.2" radius="0.05" color="yellow" class="clickable"></a-sphere>

        <a-image id="p1" src="#img1" position="0 0.2 0.1" visible="false" width="1" height="0.7"></a-image>
        <a-image id="p2" src="#img2" position="0 0.2 0.1" visible="false" width="1" height="0.7"></a-image>
        <a-image id="p3" src="#img3" position="0 0.2 0.1" visible="false" width="1" height="0.7"></a-image>
        <a-image id="p4" src="#img4" position="0 0.2 0.1" visible="false" width="1" height="0.7"></a-image>
    </a-entity>
</a-scene>

<script>
    const hps = [document.querySelector('#hp1'), document.querySelector('#hp2'), document.querySelector('#hp3'), document.querySelector('#hp4')];
    const ps = [document.querySelector('#p1'), document.querySelector('#p2'), document.querySelector('#p3'), document.querySelector('#p4')];
    hps.forEach((h, i) => {
        h.addEventListener('click', () => {
            ps.forEach(p => p.setAttribute('visible', 'false'));
            ps[i].setAttribute('visible', 'true');
        });
    });
</script>
</body>
</html>
